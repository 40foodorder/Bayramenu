    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build with Gradle
      run: ./gradlew :customer:assembleDebug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Bayramenu-Customer-App
        path: customer/build/outputs/apk/debug/customer-debug.apk
